# ==============================
# WINDOW
# ==============================

[window]
padding = { x = 10, y = 10 }
decorations = "None"   # tira borda do sistema (fica clean)
opacity = 0.75
startup_mode = "Windowed"

[window.dimensions]
columns = 100
lines = 30


# ==============================
# FONT
# ==============================

[font]
size = 11.0

[font.normal]
family = "Cascadia Code"
style = "Regular"

[font.bold]
family = "Cascadia Code"
style = "Bold"

[font.italic]
family = "Cascadia Code"
style = "Italic"

# ==============================
# CURSOR
# ==============================

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500


# ==============================
# SCROLLING
# ==============================

[scrolling]
history = 5000
multiplier = 3


# ==============================
# COLORS
# ==============================

[colors.primary]
background = "#ffffff"
foreground = "#000000"

[colors.normal]
black = "#000000"
red = "#cc0000"
green = "#4e9a06"
yellow = "#c4a000"
blue = "#3465a4"
magenta = "#75507b"
cyan = "#06989a"
white = "#d3d7cf"

[colors.bright]
black = "#555753"
red = "#ef2929"
green = "#8ae234"
yellow = "#fce94f"
blue = "#729fcf"
magenta = "#ad7fa8"
cyan = "#34e2e2"
white = "#eeeeec"


# ==============================
# PERFORMANCE
# ==============================

[env]
TERM = "xterm-256color"
